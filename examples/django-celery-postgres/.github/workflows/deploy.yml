name: Deploy

on:
  push:
    branches: [main]

# Required for GitHub Actions OIDC token
permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: ${{ vars.AWS_REGION }}

jobs:
  deploy:
    name: Build → Push → Deploy
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout ──────────────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ── 2. Configure AWS credentials via OIDC ────────────────────────────────
      # No long-lived secrets. GitHub exchanges an OIDC token for temporary
      # AWS credentials scoped to the IAM role created by the cicd module.
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      # ── 3. Login to ECR ──────────────────────────────────────────────────────
      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      # ── 4. Build Docker image ────────────────────────────────────────────────
      - name: Build Docker image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: ${{ vars.ECR_REPOSITORY }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build \
            --tag $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG \
            --tag $ECR_REGISTRY/$ECR_REPOSITORY:latest \
            --cache-from $ECR_REGISTRY/$ECR_REPOSITORY:latest \
            --build-arg BUILDKIT_INLINE_CACHE=1 \
            .

      # ── 5. Push both tags to ECR ─────────────────────────────────────────────
      - name: Push to ECR
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: ${{ vars.ECR_REPOSITORY }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest

      # ── 6. Download current task definition ──────────────────────────────────
      # Fetches the live task definition so we preserve all existing configuration
      # (secrets, env vars, log config) and only swap the image.
      - name: Download task definition
        env:
          ECS_TASK_FAMILY: ${{ vars.ECS_TASK_FAMILY }}
        run: |
          aws ecs describe-task-definition \
            --task-definition $ECS_TASK_FAMILY \
            --query taskDefinition \
            --output json \
            > task-def.json

      # ── 7. Render new task definition with updated image ─────────────────────
      - name: Render new task definition
        id: render-task-def
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: task-def.json
          container-name: app
          image: ${{ steps.login-ecr.outputs.registry }}/${{ vars.ECR_REPOSITORY }}:${{ github.sha }}

      # ── 8. Run database migrations ───────────────────────────────────────────
      # Runs BEFORE the web service deploy — a broken migration never reaches prod.
      # Uses the :latest image pushed in step 5 (ECS pulls from ECR at task start).
      # aws ecs wait tasks-stopped blocks up to 10 minutes.
      # Non-zero exit fails the workflow; the service deploy is skipped entirely.
      #
      # Required GitHub Actions variables (set from terraform output after apply):
      #   ECS_MIGRATE_TASK_FAMILY  ← module.ecs_web.migrate_task_definition_family
      #   ECS_PRIVATE_SUBNETS      ← comma-separated module.vpc.private_subnet_ids
      #   ECS_TASK_SECURITY_GROUP  ← module.ecs_web.task_security_group_id
      - name: Run database migrations
        env:
          ECS_CLUSTER: ${{ vars.ECS_CLUSTER }}
          ECS_MIGRATE_TASK_FAMILY: ${{ vars.ECS_MIGRATE_TASK_FAMILY }}
          ECS_PRIVATE_SUBNETS: ${{ vars.ECS_PRIVATE_SUBNETS }}
          ECS_TASK_SECURITY_GROUP: ${{ vars.ECS_TASK_SECURITY_GROUP }}
        run: |
          set -euo pipefail

          TASK_ARN=$(aws ecs run-task \
            --cluster "$ECS_CLUSTER" \
            --task-definition "$ECS_MIGRATE_TASK_FAMILY" \
            --launch-type FARGATE \
            --network-configuration \
              "awsvpcConfiguration={subnets=[$ECS_PRIVATE_SUBNETS],securityGroups=[$ECS_TASK_SECURITY_GROUP],assignPublicIp=DISABLED}" \
            --query 'tasks[0].taskArn' \
            --output text \
            --no-cli-pager)

          echo "Migration task: $TASK_ARN"

          aws ecs wait tasks-stopped \
            --cluster "$ECS_CLUSTER" \
            --tasks "$TASK_ARN" \
            --no-cli-pager

          EXIT_CODE=$(aws ecs describe-tasks \
            --cluster "$ECS_CLUSTER" \
            --tasks "$TASK_ARN" \
            --query 'tasks[0].containers[0].exitCode' \
            --output text \
            --no-cli-pager)

          echo "Migration exit code: $EXIT_CODE"
          if [ "$EXIT_CODE" != "0" ]; then
            echo "::error::Migration failed (exit $EXIT_CODE). Aborting deploy."
            exit 1
          fi
          echo "Migrations complete."

      # ── 9. Deploy to ECS (web service) ───────────────────────────────────────
      # Registers a new task definition revision and updates the service.
      # wait-for-service-stability: true blocks until all new tasks are healthy
      # or the deployment circuit breaker rolls back.
      - name: Deploy web service
        uses: aws-actions/amazon-ecs-deploy-task-definition@v2
        with:
          task-definition: ${{ steps.render-task-def.outputs.task-definition }}
          service: ${{ vars.ECS_WEB_SERVICE }}
          cluster: ${{ vars.ECS_CLUSTER }}
          wait-for-service-stability: true

      # ── 10. Deploy to ECS (celery worker) ────────────────────────────────────
      # Renders and deploys a separate task definition for the Celery worker.
      - name: Download Celery task definition
        env:
          ECS_CELERY_TASK_FAMILY: ${{ vars.ECS_CELERY_TASK_FAMILY }}
        run: |
          aws ecs describe-task-definition \
            --task-definition $ECS_CELERY_TASK_FAMILY \
            --query taskDefinition \
            --output json \
            > celery-task-def.json

      - name: Render Celery task definition
        id: render-celery-task-def
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: celery-task-def.json
          container-name: app
          image: ${{ steps.login-ecr.outputs.registry }}/${{ vars.ECR_REPOSITORY }}:${{ github.sha }}

      - name: Deploy Celery worker
        uses: aws-actions/amazon-ecs-deploy-task-definition@v2
        with:
          task-definition: ${{ steps.render-celery-task-def.outputs.task-definition }}
          service: ${{ vars.ECS_CELERY_SERVICE }}
          cluster: ${{ vars.ECS_CLUSTER }}
          wait-for-service-stability: true
